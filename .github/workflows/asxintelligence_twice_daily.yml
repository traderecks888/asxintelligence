name: ASX Intelligence – Twice Daily Refresh

on:
  workflow_dispatch:
  schedule:
    # GitHub cron uses UTC.
    # AEDT (Sydney summer, UTC+11):
    # Mid-session (~13:00 Sydney) -> 02:00 UTC
    - cron: "0 2 * * 1-5"
    # End-of-session (~16:25 Sydney) -> 05:25 UTC
    - cron: "25 5 * * 1-5"

    # AEST (Sydney winter, UTC+10): uncomment these and remove the AEDT lines above.
    # - cron: "0 3 * * 1-5"
    # - cron: "25 6 * * 1-5"

concurrency:
  group: asxintelligence-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run exporter
        run: |
          python asx_intrinsic_valuations_export.py --resume --universe_max_age_days 30 --public_dir public/data --sleep 0.25 --history_period 1y --benchmark ^AXJO

      - name: Commit updated data (public/data)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data || true
          if git diff --cached --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          git commit -m "data: refresh public dataset"
          git push
