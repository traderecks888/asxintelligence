name: ASX Intelligence – Twice Daily Refresh

on:
  workflow_dispatch:
    inputs:
      force_run:
        description: "Run even if it's a national AU public holiday (Sydney)"
        required: false
        default: true
        type: boolean
      debug_fast:
        description: "Debug mode: smaller sleep + skip resume (can help isolate issues)"
        required: false
        default: false
        type: boolean
  schedule:
    # GitHub cron uses UTC.
    #
    # Target times are based on ASX trading hours (Sydney time).
    #
    # AEDT (Sydney summer, UTC+11):
    # Mid-session (~13:00 Sydney) -> 02:00 UTC
    - cron: "0 2 * * 1-5"
    # End-of-session (~16:25 Sydney) -> 05:25 UTC
    - cron: "25 5 * * 1-5"
    #
    # AEST (Sydney winter, UTC+10):
    # Uncomment these and remove the AEDT lines above if you want winter-perfect timing.
    # - cron: "0 3 * * 1-5"
    # - cron: "25 6 * * 1-5"

permissions:
  contents: write
  issues: write

concurrency:
  group: asxintelligence-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 47

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # Used to skip national AU public holidays (Sydney time)
          pip install holidays

      # Guardrail: fail the workflow if screener JS has a syntax error
      - name: Validate screener JS (syntax)
        run: |
          node --version
          node --check public/screener.js

      - name: Skip on AU national public holidays (Sydney time)
        id: holiday
        env:
          FORCE_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.force_run || false }}
        run: |
          python - <<'PY'
          import os
          from datetime import datetime
          from zoneinfo import ZoneInfo
          import holidays

          # Use Sydney date because the workflow schedule is UTC-based.
          today = datetime.now(ZoneInfo("Australia/Sydney")).date()

          au = holidays.Australia(years=[today.year])
          name = au.get(today)  # holiday name or None

          # "National" holidays (not state-only). We treat "Observed" variants as national too.
          national_keywords = [
            "New Year's Day",
            "Australia Day",
            "Good Friday",
            "Easter Monday",
            "Anzac Day",
            "Christmas Day",
            "Boxing Day",
          ]

          force_run = os.getenv('FORCE_RUN', '').lower() == 'true'
          is_national = (not force_run) and bool(name) and any(k in name for k in national_keywords)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
            f.write(f"skip={'true' if is_national else 'false'}\n")
            f.write(f"holiday_name={(name or '')}\n")

          if is_national:
            print(f"Skipping refresh: {today} is a national public holiday: {name}")
          else:
            print(f"Not a national public holiday: {today} ({name or 'none'})")
          PY

      - name: Note skip (holiday)
        if: steps.holiday.outputs.skip == 'true'
        run: |
          echo "Holiday detected (Sydney): ${{ steps.holiday.outputs.holiday_name }}"
          echo "Skipping valuation refresh + commit to save minutes."

      - name: Run valuation refresh
        if: steps.holiday.outputs.skip != 'true'
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.debug_fast }}" = "true" ]; then
            echo "Debug-fast mode enabled"
            python asx_intrinsic_valuations_export.py --update_mode technicals --no_long_tf --generate_rrg --rrg_tf all --universe_max_age_days 30 --public_dir public/data --sleep 0.05 --history_period 1y --benchmark ^AXJO
          else
            python asx_intrinsic_valuations_export.py --resume --update_mode technicals --no_long_tf --generate_rrg --rrg_tf all --universe_max_age_days 30 --public_dir public/data --sleep 0.25 --history_period 1y --benchmark ^AXJO
          fi

      - name: Smoke check outputs exist
        if: steps.holiday.outputs.skip != 'true'
        run: |
          test -f public/data/manifest.json
          test -f public/data/latest_web.json
          test -f public/data/latest.xlsx
          python - <<'PY'
          import json, pathlib
          p = pathlib.Path("public/data/latest_web.json")
          data = json.loads(p.read_text(encoding="utf-8"))
          assert isinstance(data, list) and len(data) > 0
          print("OK: latest_web.json rows:", len(data))
          PY

      - name: Upload debug artifacts (only if failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: asxintelligence-debug
          retention-days: 7
          if-no-files-found: ignore
          path: |
            public/data/manifest.json
            public/data/latest_web.json
            public/data/latest.xlsx

      - name: Commit updated data (public/data)
        if: success() && steps.holiday.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data || true
          if git diff --cached --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          git commit -m "data: refresh public dataset"
          git push

      - name: Create GitHub issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = `ASX twice-daily refresh failed (${new Date().toISOString().slice(0,10)})`;
            const body = [
              "The scheduled ASX twice-daily refresh workflow failed.",
              "",
              `Run: ${runUrl}`,
              "",
              "Suggested checks:",
              "- Yahoo/yfinance intermittent issues or rate limiting",
              "- Missing dependencies in requirements.txt",
              "- Data source / HTML changes upstream",
              "- JS syntax check failed (see logs)",
              "",
              "Tip: the Smoke check step usually pinpoints missing outputs.",
            ].join("\n");
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body
            });
