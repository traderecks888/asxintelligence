name: Monthly ASX refresh

on:
  schedule:
    # Schedules are UTC.
    # 00:30 UTC on the 1st is 08:30 in Perth (AWST, UTC+8).
    - cron: "30 0 1 * *"
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

concurrency:
  group: monthly-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Optional Parquet support:
          # pip install pyarrow

      - name: Run monthly valuation refresh
        run: |
          python asx_intrinsic_valuations_export.py --resume --universe_max_age_days 30 --public_dir public/data --sleep 0.25 --history_period 1y --benchmark ^AXJO

      - name: Smoke check outputs exist
        run: |
          test -f public/data/manifest.json
          test -f public/data/latest_web.json
          test -f public/data/latest.xlsx
          python - <<'PY'
          import json, pathlib
          p = pathlib.Path("public/data/latest_web.json")
          data = json.loads(p.read_text(encoding="utf-8"))
          assert isinstance(data, list) and len(data) > 0
          print("OK: latest_web.json rows:", len(data))
          PY

      - name: Upload run artifacts (debug)
        uses: actions/upload-artifact@v4
        with:
          name: asxintelligence-outputs
          path: |
            public/data/manifest.json
            public/data/latest_web.json
          retention-days: 14

      - name: Commit updated outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add public/data || true

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Monthly refresh: $(date -u +'%Y-%m-%d')"
          git push

      - name: Create GitHub issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = `ASX monthly refresh failed (${new Date().toISOString().slice(0,10)})`;
            const body = [
              "The scheduled ASX refresh workflow failed.",
              "",
              `Run: ${runUrl}`,
              "",
              "Suggested checks:",
              "- yfinance rate limiting / intermittent Yahoo issues",
              "- Universe scraper changes",
              "- Missing dependencies",
              "",
              "Tip: open the workflow logs; the smoke-check step usually pinpoints missing outputs.",
            ].join("\n");
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body
            });

      - name: Validate screener JS (syntax)
        run: |
          node --version
          node --check public/screener.js
