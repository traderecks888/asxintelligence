name: Monthly ASX refresh

on:
  schedule:
    # GitHub Actions schedules use UTC.
    # 00:30 UTC on the 1st is 08:30 in Perth (AWST, UTC+8).
    - cron: "30 0 1 * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: monthly-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Optional Parquet support:
          # pip install pyarrow

      - name: Run monthly valuation refresh
        run: |
          python asx_intrinsic_valuations_export.py --resume --universe_max_age_days 30 --public_dir public/data --sleep 0.25 --history_period 1y --benchmark ^AXJO

      - name: Commit updated outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add public/data || true

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Monthly refresh: $(date -u +'%Y-%m-%d')"
          git push
