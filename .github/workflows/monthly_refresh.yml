name: Monthly ASX refresh

on:
  workflow_dispatch: {}
  schedule:
    # Schedules are UTC.
    # 00:30 UTC on the 1st is 08:30 in Perth (AWST, UTC+8).
    - cron: "30 0 1 * *"

permissions:
  contents: write
  issues: write

concurrency:
  group: monthly-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Validate screener JS (syntax)
        run: |
          node --version
          node --check public/screener.js

      - name: Run valuation refresh (monthly)
        run: |
          python asx_intrinsic_valuations_export.py --resume --universe_max_age_days 30 --public_dir public/data --sleep 0.25 --history_period 5y --benchmark ^AXJO

      - name: Smoke check outputs exist
        run: |
          test -f public/data/manifest.json
          test -f public/data/latest_web.json
          test -f public/data/latest.xlsx

      - name: Upload debug artifacts (only if failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: asxintelligence-monthly-debug
          retention-days: 14
          if-no-files-found: ignore
          path: |
            public/data/manifest.json
            public/data/latest_web.json
            public/data/latest.xlsx

      - name: Commit updated data (public/data)
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data || true
          if git diff --cached --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          git commit -m "data: monthly refresh public dataset"
          git push

      - name: Create GitHub issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = `ASX monthly refresh failed (${new Date().toISOString().slice(0,10)})`;
            const body = [
              "The scheduled ASX monthly refresh workflow failed.",
              "",
              `Run: ${runUrl}`,
              "",
              "Tip: open the workflow logs; the smoke-check step usually pinpoints missing outputs.",
            ].join("\n");
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body
            });
