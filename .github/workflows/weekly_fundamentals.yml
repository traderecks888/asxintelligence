name: ASX Intelligence – Weekly Fundamentals Refresh

on:
  workflow_dispatch:
    inputs:
      force_run:
        description: "Run even if it's a national AU public holiday (Sydney)"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  issues: write

concurrency:
  group: asxintelligence-weekly
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install holidays

      - name: Skip on AU national public holidays (Sydney time)
        id: holiday
        env:
          FORCE_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.force_run || false }}
        run: |
          python - <<'PY'
          import os
          from datetime import datetime
          from zoneinfo import ZoneInfo
          import holidays

          today = datetime.now(ZoneInfo("Australia/Sydney")).date()
          au = holidays.Australia(years=[today.year])
          name = au.get(today)

          national_keywords = [
            "New Year's Day",
            "Australia Day",
            "Good Friday",
            "Easter Monday",
            "Anzac Day",
            "Christmas Day",
            "Boxing Day",
          ]

          force_run = os.getenv('FORCE_RUN', '').lower() == 'true'
          is_national = (not force_run) and bool(name) and any(k in name for k in national_keywords)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
            f.write(f"skip={'true' if is_national else 'false'}\n")
            f.write(f"holiday_name={(name or '')}\n")

          if is_national:
            print(f"Skipping refresh: {today} is a national public holiday: {name}")
          else:
            print(f"Not a national public holiday: {today} ({name or 'none'})")
          PY

      - name: Run full refresh (fundamentals + technicals)
        if: steps.holiday.outputs.skip != 'true'
        run: |
          python asx_intrinsic_valuations_export.py --resume --inputs_mode public --public_universe_url "https://raw.githubusercontent.com/traderecks999/data/refs/heads/main/asx/universe_latest.json" --public_prices_url "https://raw.githubusercontent.com/traderecks999/data/refs/heads/main/asx/prices_latest.json" --public_fundamentals_url "https://raw.githubusercontent.com/traderecks999/data/refs/heads/main/asx/fundamentals_latest.json" --update_mode full --generate_rrg --rrg_tf all --public_dir public/data --sleep 0.15 --history_period 1y --benchmark ^AXJO



      - name: Smoke check outputs valid (non-empty JSON)
        if: steps.holiday.outputs.skip != 'true'
        run: |
          set -e
          ls -la public/data
          test -f public/data/latest.xlsx
          test -s public/data/manifest.json
          test -s public/data/latest_web.json
          test -s public/data/rrg_sectors.json

          # Validate JSON is parseable and non-empty
          python - <<'PY'
          import json
          from pathlib import Path
          m = json.loads(Path('public/data/manifest.json').read_text(encoding='utf-8'))
          rows = json.loads(Path('public/data/latest_web.json').read_text(encoding='utf-8'))
          rrg = json.loads(Path('public/data/rrg_sectors.json').read_text(encoding='utf-8'))

          assert isinstance(rows, list) and len(rows) > 0, 'latest_web.json is empty'
          assert isinstance(m, dict) and m.get('rows', 0) and int(m.get('rows', 0)) > 0, 'manifest.json missing/invalid rows'
          # manifest rows should broadly match latest_web rows, but allow some drift
          assert abs(int(m.get('rows')) - len(rows)) < max(50, int(0.05*len(rows))), f"manifest.rows ({m.get('rows')}) doesn't match latest_web rows ({len(rows)})"
          assert isinstance(rrg, dict) and (rrg.get('data') or rrg.get('daily') or rrg.get('weekly') or rrg.get('monthly')), 'rrg_sectors.json looks empty'
          print('Smoke check passed:', {'manifest_rows': m.get('rows'), 'latest_web_rows': len(rows)})
          PY

      - name: Commit updated data (public/data)
        if: success() && steps.holiday.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data || true
          if git diff --cached --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          git commit -m "data: weekly fundamentals refresh"
          git push

      - name: Create GitHub issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = `ASX weekly fundamentals refresh failed (${new Date().toISOString().slice(0,10)})`;
            const body = [
              "The scheduled weekly fundamentals refresh workflow failed.",
              "",
              `Run: ${runUrl}`,
              "",
              "Suggested checks:",
              "- Yahoo/yfinance intermittent issues or rate limiting",
              "- Missing dependencies in requirements.txt",
              "- Data source / HTML changes upstream",
              "",
            ].join("\n");
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body
            });
